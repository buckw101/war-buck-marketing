<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faff"/>
      <stop offset="100%" style="stop-color:#e8f0ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="630" fill="#2563eb"/>
  <!-- Logo mark -->
  <rect x="80" y="220" width="80" height="80" rx="16" fill="#2563eb"/>
  <text x="120" y="272" font-family="system-ui,sans-serif" font-weight="800" font-size="36" fill="white" text-anchor="middle">WB</text>
  <!-- Brand name -->
  <text x="180" y="248" font-family="system-ui,sans-serif" font-weight="800" font-size="48" fill="#0a0a0a">War-Buck</text>
  <text x="180" y="300" font-family="system-ui,sans-serif" font-weight="800" font-size="48" fill="#2563eb">Marketing</text>
  <!-- Tagline -->
  <text x="80" y="380" font-family="system-ui,sans-serif" font-weight="500" font-size="28" fill="#374151">Turn Your Attention Into Revenue</text>
  <!-- Divider -->
  <rect x="80" y="410" width="120" height="4" rx="2" fill="#2563eb"/>
  <!-- Sub tagline -->
  <text x="80" y="460" font-family="system-ui,sans-serif" font-weight="400" font-size="22" fill="#6b7280">Paid Ads &amp; Organic Social Media for Service Businesses</text>
  <!-- URL -->
  <text x="80" y="560" font-family="system-ui,sans-serif" font-weight="600" font-size="20" fill="#2563eb">warbuckmarketing.com</text>
</svg>
